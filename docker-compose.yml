services:
  redis:
    image: redis:7-alpine
    container_name: yolo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  yolo-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-service
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      MODEL_PATH: ${MODEL_PATH:-models/yolov8n.pt}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      PERSON_CONFIDENCE_THRESHOLD: ${PERSON_CONFIDENCE_THRESHOLD:-0.45}
      MULTIPLE_PERSON_CONFIDENCE_THRESHOLD: ${MULTIPLE_PERSON_CONFIDENCE_THRESHOLD:-0.55}
      PERSON_MIN_AREA_RATIO: ${PERSON_MIN_AREA_RATIO:-0.015}
      IOU_THRESHOLD: ${IOU_THRESHOLD:-0.45}
      MAX_WARNINGS: ${MAX_WARNINGS:-5}
      VIOLATION_WINDOW_SECONDS: ${VIOLATION_WINDOW_SECONDS:-60}
      VIOLATION_COOLDOWN_SECONDS: ${VIOLATION_COOLDOWN_SECONDS:-5}
      MULTIPLE_FACES_CONSECUTIVE_FRAMES: ${MULTIPLE_FACES_CONSECUTIVE_FRAMES:-2}
      LEAVING_FRAME_CONSECUTIVE_FRAMES: ${LEAVING_FRAME_CONSECUTIVE_FRAMES:-2}
      LOOKING_AWAY_CONSECUTIVE_FRAMES: ${LOOKING_AWAY_CONSECUTIVE_FRAMES:-2}
      FACE_OCCLUDED_CONSECUTIVE_FRAMES: ${FACE_OCCLUDED_CONSECUTIVE_FRAMES:-2}
      EYE_CLOSED_CONSECUTIVE_FRAMES: ${EYE_CLOSED_CONSECUTIVE_FRAMES:-3}
    ports:
      - "${PORT:-8001}:8001"

volumes:
  redis_data:
